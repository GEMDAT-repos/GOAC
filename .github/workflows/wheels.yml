name: Build wheels

# Builds binary wheels for CPython 3.10–3.14 on Linux, macOS and Windows, plus
# an sdist. When a GitHub Release is published the artifacts are attached to it,
# which makes the release page installable with:
#
#   pip install GOAC --no-index \
#       --find-links https://github.com/GEMDAT-repos/GOAC/releases/expanded_assets/vX.Y.Z
#
# (the expanded_assets/<tag> URL is an HTML listing of the release assets that
#  pip's --find-links can resolve).

on:
  release:
    types: [published]
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/wheels.yml
      - pyproject.toml
      - setup.py
      - GOAC/*.f90

jobs:
  build_wheels:
    name: Wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-latest is Apple Silicon (arm64); Intel macOS is not built.
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      # Linux builds run inside the manylinux container, which installs its own
      # gfortran via the `before-all` hook in pyproject.toml. macOS and Windows
      # build on the host, so the toolchain has to be provisioned here.
      - name: Set up Fortran (macOS/Windows)
        id: fortran
        if: runner.os != 'Linux'
        uses: fortran-lang/setup-fortran@v1
        with:
          compiler: gcc

      # The Homebrew gfortran runtime (libgfortran/libgomp/libquadmath) is built
      # for the runner's own macOS, so the wheel's deployment target must be at
      # least that high or delocate refuses to bundle those libs. Derive it from
      # the runner instead of hardcoding, so it keeps working as images bump.
      - name: Set macOS deployment target from runner
        if: runner.os == 'macOS'
        shell: bash
        run: |
          major="$(sw_vers -productVersion | cut -d. -f1)"
          echo "MACOSX_DEPLOYMENT_TARGET=${major}.0" >> "$GITHUB_ENV"
          echo "Using MACOSX_DEPLOYMENT_TARGET=${major}.0"

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          # macOS builds the runner's native arch only (arm64). gfortran can't
          # cross-compile x86_64 from the arm64 runner, so Intel macOS wheels
          # are not produced; Intel Macs fall back to the sdist.
          CIBW_ARCHS_MACOS: native
          # The mingw gcc/gfortran from setup-fortran is 64-bit only, so it
          # can't build the default 32-bit (win32) wheels. Build AMD64 only.
          CIBW_ARCHS_WINDOWS: AMD64
          # Forward the GNU toolchain selected by setup-fortran so meson/f2py
          # use a consistent gcc + gfortran (with OpenMP) on host builds.
          # MACOSX_DEPLOYMENT_TARGET comes from the step above via $GITHUB_ENV.
          CIBW_ENVIRONMENT_MACOS: >-
            MACOSX_DEPLOYMENT_TARGET=${{ env.MACOSX_DEPLOYMENT_TARGET }}
            FC=${{ steps.fortran.outputs.fc }}
            CC=${{ steps.fortran.outputs.cc }}
          CIBW_ENVIRONMENT_WINDOWS: >-
            FC=${{ steps.fortran.outputs.fc }}
            CC=${{ steps.fortran.outputs.cc }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Smoke-test every built wheel by installing it the same way end users will
  # (pip --no-index --find-links) and importing the compiled extensions.
  # --no-deps keeps it fast and avoids pulling pymatgen/gurobipy, which the
  # import smoke test does not need.
  test_wheels:
    name: Smoke-test ${{ matrix.os }} py${{ matrix.python }}
    needs: build_wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true

      - name: Download wheels for this OS
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse

      - name: Install wheel (no deps) and import
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # The f2py-compiled extensions import numpy at load time, so it is a
          # real runtime requirement. pymatgen/gurobipy are not needed by the
          # imports below, so install only numpy and skip the rest via --no-deps.
          pip install numpy
          # Same install path users take; pip picks the wheel matching this
          # interpreter/platform.
          pip install GOAC --no-index --no-deps --find-links wheelhouse
          # Run from a neutral dir so we import the installed package, not a
          # checkout (there is none in this job, but be explicit).
          cd "$RUNNER_TEMP"
          python -c "import GOAC; print('GOAC', GOAC.__version__, 'OK')"
          python -c "import ABCEwald; print('ABCEwald OK')"
          python -c "from GOAC import greedy, random_samples, energy; print('Fortran functions OK')"

  upload_release:
    name: Attach artifacts to the release
    needs: [build_wheels, build_sdist, test_wheels]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
